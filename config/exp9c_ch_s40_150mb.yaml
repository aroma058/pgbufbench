database:
  host: localhost
  port: 5432
  name: bgbenchdb
  user: bgbench
  password: bgbench123
workload:
  type: chbenchmark
  scale: 40
  clients: 1
  threads: 1
  duration: 1200
  chbenchmark:
    analytical_threads: 1
postgresql:
  shared_buffers: 150MB
  checkpoint_timeout: 5min
  checkpoint_completion_target: 0.9
  autovacuum: on
monitor:
  interval: 1
output:
  results_dir: results/
